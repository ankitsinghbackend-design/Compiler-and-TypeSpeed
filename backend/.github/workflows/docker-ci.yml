name: Docker CI

on:
  push:
    branches: [ main ]
    paths:
      - '**'  # Track all changes in this repository
  pull_request:
    branches: [ main ]
    paths:
      - '**'  # Track all changes in this repository
  workflow_dispatch: # Allows manual triggering

jobs:
  docker-build-test:
    name: Build and Test Docker Image
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./
          file: ./dockerfile
                    push: false
          tags: labbuddy/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true
      
      - name: Test Docker image
        run: |
          docker run --name labbuddy-backend-test -d -p 5001:5001 --env-file ./.env.example labbuddy/backend:latest
          sleep 10
          docker ps
          docker logs labbuddy-backend-test
          docker stop labbuddy-backend-test
      
      - name: Notify Slack on success
        if: success()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          fields: repo,message,commit,author,action,eventName,ref,workflow
          text: 'Docker build and test successful! :whale:'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      
      - name: Notify Slack on failure
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          fields: repo,message,commit,author,action,eventName,ref,workflow
          text: 'Docker build and test failed! :x:'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
